<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/21/21601.png">
    <title>NewsApp - Stay Updated</title>
</head>

<body>
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">

    <!-- Brand -->
    <span class="navbar-brand">NewsApp</span>
  </div>
</nav>

<!-- Categories + Search (SEPARATE SECTION) -->
<div class="bg-dark p-3 mb-2">

  <!-- Categories -->
  <div class="d-flex overflow-auto mb-2 category-scroll">
    <button class="btn btn-outline-light me-2 category-btn active" data-category="general">General</button>
    <button class="btn btn-outline-light me-2 category-btn" data-category="business">Business</button>
    <button class="btn btn-outline-light me-2 category-btn" data-category="technology">Technology</button>
    <button class="btn btn-outline-light me-2 category-btn" data-category="sports">Sports</button>
    <button class="btn btn-outline-light me-2 category-btn" data-category="health">Health</button>
    <button class="btn btn-outline-light me-2" id="savedBtn">Saved</button>
  </div>

  <!-- Search -->
  <form class="d-flex flex-column flex-md-row gap-2 col-md-6" id="searchForm">
    <input class="form-control" type="search" placeholder="Search news..." id="searchInput">
    <button class="btn btn-outline-light" type="submit">Search</button>
  </form>

</div>

    <!-- loader -->
    <div id="loader" class="hidden">
        <h3>Loading...</h3>
    </div>
    <!-- Cards -->
    <div class="container mt-4">
        <div class="row g-4" id="news-container">
            <!-- JS will insert cards here -->
        </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script src="script.js"></script>

</html>
