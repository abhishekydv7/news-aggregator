<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
    <title>Document</title>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-left">
                <h2>NewsApp</h2>
                <div class="categories">
                    <button class="category-btn" data-category="business">Business</button>
                    <button class="category-btn" data-category="technology">Technology</button>
                    <button class="category-btn" data-category="sports">Sports</button>
                    <button class="category-btn" data-category="health">Health</button>
                    <button class="category-btn" data-category="science">Science</button>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row" id = "news-container">
            <img class="card-img-top" id="news-img">
                <div class="card-body">
                     <h2 class="card-title" id="news-title"></h2>
                     <p class="card-text" id="news-desc"></p>
                </div>
        </div>
    </div>
   
</body>
<script src="script.js"></script>
</html>
